<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doable — Task Manager</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-mesh" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="app-shell">

    <!-- HEADER -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo">
          <span class="logo-mark">✦</span>
          <span class="logo-text">doable</span>
        </div>
        <p class="header-date" id="header-date"></p>
      </div>
      <button class="theme-btn" id="theme-btn" aria-label="Toggle dark mode">
        <span id="theme-icon">☾</span>
      </button>
    </header>

    <!-- STATS -->
    <section class="stats-bar">
      <div class="stat-block">
        <span class="stat-num" id="stat-total">0</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-block">
        <span class="stat-num done-num" id="stat-done">0</span>
        <span class="stat-lbl">Done</span>
      </div>
      <div class="stat-sep"></div>
      <div class="stat-block">
        <span class="stat-num" id="stat-pending">0</span>
        <span class="stat-lbl">Pending</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="progress-pct" id="progress-pct">0%</span>
    </section>

    <!-- ADD CARD -->
    <div class="add-card">
      <p class="add-card-eyebrow">New Task</p>
      <div class="add-input-row">
        <input
          type="text" id="task-input" class="task-input"
          placeholder="What needs to be done?"
          maxlength="140" autocomplete="off"
        />
        <button class="add-btn" id="add-btn">
          Add Task
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="add-options-row">
        <div class="opt-group">
          <span class="opt-label">Priority</span>
          <div class="p-tabs">
            <button class="p-tab high" data-p="high">🔴 High</button>
            <button class="p-tab mid selected" data-p="mid">🟡 Med</button>
            <button class="p-tab low" data-p="low">🟢 Low</button>
          </div>
        </div>
        <div class="opt-group">
          <label class="opt-label" for="due-input">Due Date</label>
          <input type="date" id="due-input" class="opt-input" />
        </div>
        <div class="opt-group">
          <label class="opt-label" for="tag-input">Tag</label>
          <input type="text" id="tag-input" class="opt-input tag-input" placeholder="e.g. work" maxlength="16" />
        </div>
      </div>
    </div>

    <!-- CONTROLS -->
    <div class="controls-bar">
      <div class="filter-tabs">
        <button class="ftab active" data-filter="all">All</button>
        <button class="ftab" data-filter="pending">Pending</button>
        <button class="ftab" data-filter="completed">Completed</button>
      </div>
      <div class="right-controls">
        <div class="search-wrap">
          <svg class="srch-ic" width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M9 9l3.5 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <input type="text" id="search-input" placeholder="Search…" />
        </div>
        <select id="sort-select" class="sort-select">
          <option value="newest">Newest</option>
          <option value="oldest">Oldest</option>
          <option value="priority">Priority</option>
          <option value="alpha">A–Z</option>
          <option value="due">Due Date</option>
        </select>
      </div>
    </div>

    <!-- TASK LIST -->
    <ul class="task-list" id="task-list"></ul>

    <!-- EMPTY STATE -->
    <div class="empty-state" id="empty-state">
      <div class="empty-illo">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" width="80" height="80">
          <rect x="18" y="26" width="64" height="56" rx="8" fill="currentColor" opacity="0.06"/>
          <rect x="24" y="18" width="52" height="58" rx="8" stroke="currentColor" stroke-width="2" opacity="0.2"/>
          <path d="M36 40h28M36 52h20" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
          <circle cx="72" cy="70" r="14" fill="currentColor" opacity="0.08"/>
          <path d="M66 70h12M72 64v12" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.35"/>
        </svg>
      </div>
      <p class="empty-h" id="empty-h">No tasks yet</p>
      <p class="empty-p" id="empty-p">Add your first task above to get started.</p>
    </div>

    <!-- FOOTER -->
    <footer class="app-footer">
      <button class="clear-btn" id="clear-btn">✕ Clear completed</button>
      <span class="drag-hint">⠿ Drag to reorder</span>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
